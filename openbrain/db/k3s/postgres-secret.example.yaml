# Copy to postgres-secret.yaml, fill in real values, and DO NOT commit it.
# Generate strong passwords with: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: openbrain
type: Opaque
stringData:
  POSTGRES_DB: openbrain
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_PASSWORD
  # Application role password (used by MCP worker + WhatsApp worker)
  APP_USER_PASSWORD: REPLACE_WITH_ANOTHER_STRONG_PASSWORD
